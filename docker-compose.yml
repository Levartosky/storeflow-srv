version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: storeflow-postgres
    environment:
      POSTGRES_DB: storeflow
      POSTGRES_USER: storeflow
      POSTGRES_PASSWORD: storeflow
    ports:
      - "5432:5432"
    volumes:
      - storeflow_postgres_data:/var/lib/postgresql/data

volumes:
  storeflow_postgres_data: